<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>개인정보 처리방침 - Stan</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .privacy-page { height: 100vh; height: 100dvh; display: flex; flex-direction: column; }
    .privacy-header {
      flex-shrink: 0;
      padding: 12px 16px;
      padding-top: calc(12px + env(safe-area-inset-top, 0px));
      background: #fff;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .privacy-back {
      color: #333;
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .privacy-back:hover { opacity: 0.8; }
    .privacy-title { font-size: 17px; font-weight: 600; color: #191919; margin: 0; }
    .privacy-wrap {
      flex: 1;
      min-height: 0;
      width: 100%;
      background: #525659;
    }
    .privacy-wrap embed {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div class="privacy-page">
    <header class="privacy-header">
      <a href="/" class="privacy-back" aria-label="메인으로 돌아가기">← 돌아가기</a>
      <h1 class="privacy-title">개인정보 처리방침</h1>
    </header>
    <div class="privacy-wrap">
      <embed src="privacy.pdf" type="application/pdf" title="개인정보 처리방침" />
    </div>
  </div>
</body>
</html>
