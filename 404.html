<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Not Found</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 24px;
      }
      .card {
        max-width: 560px;
        width: 100%;
        border: 1px solid rgba(127, 127, 127, 0.25);
        border-radius: 16px;
        padding: 20px 18px;
      }
      h1 { margin: 0 0 8px; font-size: 20px; }
      p { margin: 0; opacity: 0.8; line-height: 1.5; }
      a { display: inline-block; margin-top: 14px; }
    </style>
  </head>
  <body>
    <main class="card" role="main" aria-label="404">
      <h1>페이지를 찾을 수 없습니다</h1>
      <p>요청하신 경로는 현재 접근할 수 없습니다.</p>
      <a href="/">홈으로 돌아가기</a>
    </main>
  </body>
</html>
